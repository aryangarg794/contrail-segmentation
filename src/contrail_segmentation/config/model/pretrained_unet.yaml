  in_channels: 24
  classes: 1

dice_loss: 
  _partial_: true
  _target_: segmentation_models_pytorch.losses.DiceLoss
  from_logits: true
  mode: binary

bce_loss: 
  _partial_: true
  _target_: torch.nn.BCEWithLogitsLoss
